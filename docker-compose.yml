version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: bankflow-postgres
    environment:
      POSTGRES_DB: bankflow_accounts
      POSTGRES_USER: bankflow
      POSTGRES_PASSWORD: bankflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bankflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: bankflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bankflow-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bankflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # TWO listeners:
      # PLAINTEXT       → for apps on HOST machine (localhost:9092)
      # PLAINTEXT_INTERNAL → for containers inside Docker network
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - bankflow-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bankflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bankflow-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092   # ← container name!
    networks:
      - bankflow-network

volumes:
  postgres_data:

networks:
  bankflow-network:
    driver: bridge